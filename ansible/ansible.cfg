[defaults]
inventory = ./inventory.ini
host_key_checking = False
remote_user = root
# private_key_file intentionally not set.
# Ansible will use ansible_ssh_private_key_file / -e, SSH agent, or other inventory vars.
# Keeping this blank avoids failures when ~/.ssh/id_rsa is missing.

gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 86400
deprecation_warnings = False
