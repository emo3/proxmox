---
- name: Automate Proxmox VE Unattended ISO Preparation (AlmaLinux 9)
  hosts: localhost
  become: yes
  become_user: "{{ ansible_user_id | default(lookup('env','USER')) }}"
  gather_facts: true

  vars:
    # Dedicated directory to avoid SELinux /tmp restrictions
    work_dir: "{{ playbook_dir }}/tmp"

    # Expected SHA256 of the ISO.
    proxmox_iso_sha256: "4e88fe416df9b527624a175f24c9aa07c714d3332afb1ee3dbf3879573ef2c6c"

    # Where we expect the original Proxmox VE ISO to be located (or downloaded to)
    # If you already have an ISO elsewhere, set source_iso via --extra-vars.
    source_iso: "{{ work_dir }}/proxmox-ve.iso"

    # Output ISO with answers injected
    output_iso: "{{ work_dir }}/proxmox-ve-automated.iso"

    # Proxmox VE ISO download settings.
    proxmox_version: "9.2"
    proxmox_iso_url: "https://enterprise.proxmox.com/iso/proxmox-ve_{{ proxmox_version }}-1.iso"

    # Use SELinux relabeling on volume mounts when appropriate.
    podman_mount_suffix: >-
      {{ (ansible_selinux.status is defined and ansible_selinux.status == 'enabled') | ternary(':z','') }}

  tasks:
    - name: Ensure podman is installed (dnf family)
      ansible.builtin.dnf:
        name: podman
        state: present
      when: ansible_facts.os_family is defined and ansible_facts.os_family in ['RedHat','Rocky','AlmaLinux','Fedora']

    - name: Ensure wget is installed (dnf family)
      ansible.builtin.dnf:
        name: wget
        state: present
      when: ansible_facts.os_family is defined and ansible_facts.os_family in ['RedHat','Rocky','AlmaLinux','Fedora']

    - name: Ensure curl is installed (dnf family) # fallback
      ansible.builtin.dnf:
        name: curl
        state: present
      when: ansible_facts.os_family is defined and ansible_facts.os_family in ['RedHat','Rocky','AlmaLinux','Fedora']

    - name: Create working directory
      file:
        path: "{{ work_dir }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user_id | default(lookup('env','USER')) }}"
        group: "{{ ansible_user_id | default(lookup('env','USER')) }}"

    - name: Generate the answer.toml file
      copy:
        dest: "{{ work_dir }}/answer.toml"
        content: |
          [global]
          keyboard = "en-us"
          country = "us"
          fqdn = "pve-node-01.example.local"
          mailto = "admin@example.local"
          timezone = "America/New_York"
          root-password = "SuperSecretPassword123!"
          reboot-on-error = false
          reboot-mode = "reboot"

          [network]
          source = "from-dhcp"

          [disk-setup]
          filesystem = "ext4"
          disk-list = ["sda"]
        mode: '0644'

    - name: Create Containerfile for Debian Proxmox Builder
      copy:
        dest: "{{ work_dir }}/Containerfile"
        content: |
          FROM debian:bookworm-slim
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y wget gnupg xorriso
          RUN wget https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg -O /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg
          RUN echo "deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription" > /etc/apt/sources.list.d/pve-install-repo.list
          RUN apt-get update && apt-get install -y proxmox-auto-install-assistant
        mode: '0644'

    - name: Check if source ISO already exists
      stat:
        path: "{{ source_iso }}"
      register: iso_check

    - name: Download Proxmox VE ISO if missing
      when:
        - not iso_check.stat.exists
        - proxmox_iso_url | length > 0
      block:
        - name: Ensure curl is installed
          dnf:
            name:
              - curl
            state: present

        - name: Download Proxmox VE ISO (wget preferred, curl fallback)
          command: >-
            sh -lc '
            if command -v wget >/dev/null 2>&1; then
              wget -O "{{ source_iso }}" "{{ proxmox_iso_url }}";
            else
              curl -L --fail --output "{{ source_iso }}" "{{ proxmox_iso_url }}";
            fi'
          args:
            creates: "{{ source_iso }}"

    - name: Check source ISO again (after optional download)
      stat:
        path: "{{ source_iso }}"
      register: iso_check_after

    - name: Ensure SHA256 verification variable is set
      when: iso_check_after.stat.exists
      ansible.builtin.assert:
        that:
          - proxmox_iso_sha256 is defined
          - proxmox_iso_sha256 != 'REPLACE_ME_WITH_KNOWN_GOOD_SHA256'
        fail_msg: >-
          "Set proxmox_iso_sha256 in this playbook to the known-good sha256sum for proxmox-ve_{{ proxmox_version }}-1.iso (or pass it via --extra-vars)."

    - name: Validate downloaded ISO checksum (sha256)
      when:
        - iso_check_after.stat.exists
        - proxmox_iso_sha256 is defined
      ansible.builtin.command: >-
        sha256sum "{{ source_iso }}"
      register: iso_sha256
      changed_when: false

    - name: Assert ISO sha256 matches expected
      when:
        - iso_check_after.stat.exists
        - proxmox_iso_sha256 is defined
      ansible.builtin.assert:
        that:
          - (iso_sha256.stdout.split()[0] | lower) == (proxmox_iso_sha256 | lower)
        fail_msg: >-
          "SHA256 mismatch for {{ source_iso }}. Expected {{ proxmox_iso_sha256 }}, got {{ iso_sha256.stdout.split()[0] }}. Delete it and retry."

    - name: Halt playbook if ISO is missing
      ansible.builtin.fail:
        msg: >-
          Proxmox ISO is missing at {{ source_iso }}.
          Provide it manually at that path, or pass --extra-vars "proxmox_iso_url=<URL>" to download it.
      when:
        - not iso_check_after.stat.exists
        - (proxmox_iso_url | length == 0)

    - name: Build the Podman builder image
      ansible.builtin.command: podman build -t proxmox-iso-builder "{{ work_dir }}"

    - name: Ensure work_dir ownership is correct before container runs
      ansible.builtin.file:
        path: "{{ work_dir }}"
        state: directory
        owner: "{{ ansible_user_id | default(lookup('env','USER')) }}"
        group: "{{ ansible_user_id | default(lookup('env','USER')) }}"
        recurse: true

    - name: Preflight check - verify podman and assistant availability
      ansible.builtin.command: >-
        podman run --rm
        -v "{{ work_dir }}:/mnt{{ podman_mount_suffix }}"
        proxmox-iso-builder
        bash -lc 'command -v proxmox-auto-install-assistant && proxmox-auto-install-assistant --help | head -n 50'
      changed_when: false

    - name: Run container to prepare the automated ISO
      ansible.builtin.command: >-
        podman run --rm
        -v "{{ work_dir }}:/mnt{{ podman_mount_suffix }}"
        proxmox-iso-builder
        proxmox-auto-install-assistant prepare-iso /mnt/proxmox-ve.iso --fetch-from iso --answer-file /mnt/answer.toml --output /mnt/proxmox-ve-automated.iso
      args:
        creates: "{{ output_iso }}"

    - name: Fix work_dir ownership after container run (avoid root-owned artifacts)
      ansible.builtin.file:
        path: "{{ work_dir }}"
        state: directory
        owner: "{{ ansible_user_id | default(lookup('env','USER')) }}"
        group: "{{ ansible_user_id | default(lookup('env','USER')) }}"
        recurse: true

    - name: Success message
      debug:
        msg: "Your automated Proxmox ISO is successfully built and ready at: {{ output_iso }}"
