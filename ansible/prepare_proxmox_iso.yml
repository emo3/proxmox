---
- name: Automate Proxmox VE Unattended ISO Preparation (AlmaLinux 9)
  hosts: localhost
  become: yes
  vars:
    # Dedicated directory to avoid SELinux /tmp restrictions
    work_dir: "/opt/proxmox-builder"
    source_iso: "{{ work_dir }}/proxmox-ve.iso" 
    output_iso: "{{ work_dir }}/proxmox-ve-automated.iso"

  tasks:
    - name: Ensure Podman is installed
      dnf:
        name: podman
        state: present

    - name: Create working directory
      file:
        path: "{{ work_dir }}"
        state: directory
        mode: '0755'

    - name: Generate the answer.toml file
      copy:
        dest: "{{ work_dir }}/answer.toml"
        content: |
          [global]
          keyboard = "en-us"
          country = "us"
          fqdn = "pve-node-01.example.local"
          mailto = "admin@example.local"
          timezone = "America/New_York"
          root-password = "SuperSecretPassword123!"
          reboot-on-error = false
          reboot-mode = "reboot"

          [network]
          source = "from-dhcp"

          [disk-setup]
          filesystem = "ext4"
          disk-list = ["sda"]
        mode: '0644'

    - name: Create Containerfile for Debian Proxmox Builder
      copy:
        dest: "{{ work_dir }}/Containerfile"
        content: |
          FROM debian:bookworm-slim
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y wget gnupg xorriso
          RUN wget https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg -O /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg
          RUN echo "deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription" > /etc/apt/sources.list.d/pve-install-repo.list
          RUN apt-get update && apt-get install -y proxmox-auto-install-assistant
        mode: '0644'

    - name: Fail if the source ISO is not in the working directory
      stat:
        path: "{{ source_iso }}"
      register: iso_check

    - name: Halt playbook if ISO is missing
      fail:
        msg: "Please download the Proxmox ISO and place it at {{ source_iso }} before running this playbook."
      when: not iso_check.stat.exists

    - name: Build the Podman builder image
      command: podman build -t proxmox-iso-builder "{{ work_dir }}"

    - name: Run container to prepare the automated ISO
      # The :z flag ensures SELinux allows the container to read/write to the mounted volume
      command: >
        podman run --rm
        -v "{{ work_dir }}:/mnt:z"
        proxmox-iso-builder
        proxmox-auto-install-assistant prepare-iso /mnt/proxmox-ve.iso --fetch-from iso --answer-file /mnt/answer.toml --output /mnt/proxmox-ve-automated.iso
      args:
        creates: "{{ output_iso }}"

    - name: Success message
      debug:
        msg: "Your automated Proxmox ISO is successfully built and ready at: {{ output_iso }}"
