services:
  gitlab:
    image: proxmox-gitlab:local
    container_name: gitlab
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - gitlab_etc:/etc/gitlab
      - gitlab_opt:/var/opt/gitlab
      - gitlab_logs:/var/log/gitlab
    environment:
      # These are placeholders; GitLab omnibus reads many vars.
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8080'
volumes:
  gitlab_etc:
  gitlab_opt:
  gitlab_logs:

